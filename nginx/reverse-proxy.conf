limit_req_zone $binary_remote_addr zone=api_per_ip:20m rate=20r/s;
limit_req_zone $binary_remote_addr zone=web_per_ip:20m rate=40r/s;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:20m;
map $http_user_agent $seo_bot {
    default 0;
    ~*(googlebot|bingbot|yandex|duckduckbot|baiduspider|slurp|applebot|facebookexternalhit|facebot|twitterbot|linkedinbot|slackbot|discordbot|telegrambot|whatsapp|skypeuripreview|pinterest|redditbot) 1;
}

server {
    listen 80;
    listen [::]:80;
    server_name wayesports.space www.wayesports.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wayesports.space www.wayesports.space;
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream http://api:3000;
    set $web_upstream http://web:80;
    set $bot_upstream http://bot:8080;

    ssl_certificate /etc/letsencrypt/live/wayesports.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wayesports.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    location /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location ^~ /api/uploads/ {
        alias /var/www/uploads/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /api/ {
        limit_req zone=api_per_ip burst=60 nodelay;
        limit_conn conn_per_ip 40;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Telegram-Data $http_x_telegram_data;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location ^~ /uploads/ {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = /telegram/webhook {
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    location = /telegram/health {
        proxy_pass $bot_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }

    location ^~ /api-docs {
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location ^~ /assets/ {
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location @seo_render {
        proxy_pass $api_upstream/api/seo/render?path=$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = / {
        error_page 418 = @seo_render;
        if ($seo_bot) { return 418; }
        limit_req zone=web_per_ip burst=120 nodelay;
        limit_conn conn_per_ip 80;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location ~* ^/((news/category(?:/[^/?#]+)?|news(?:/[^/?#]+)?|tournaments(?:/[^/?#]+)?|teams(?:/[^/?#]+)?|team(?:/[^/?#]+)?|games(?:/[^/?#]+)?|profile(?:/[^/?#]+)?|user(?:/[^/?#]+)?|scouts(?:/[^/?#]+)?|rankings|matches))/?$ {
        error_page 418 = @seo_render;
        if ($seo_bot) { return 418; }
        limit_req zone=web_per_ip burst=120 nodelay;
        limit_conn conn_per_ip 80;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location / {
        limit_req zone=web_per_ip burst=120 nodelay;
        limit_conn conn_per_ip 80;
        proxy_pass $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Drop common scanner paths quickly
    location ~* ^/(?:\.env|\.git|wp-admin|phpmyadmin|vendor/phpunit) {
        return 404;
    }
}
